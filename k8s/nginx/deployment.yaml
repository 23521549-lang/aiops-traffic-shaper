apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-proxy
  namespace: aiops
  labels:
    app: nginx-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-proxy
  template:
    metadata:
      labels:
        app: nginx-proxy
    spec:
      shareProcessNamespace: true
      securityContext:
        fsGroup: 101
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: nginx-blocklist
              mountPath: /etc/nginx/blocklist.d
            - name: nginx-logs
              mountPath: /var/log/nginx

        - name: reloader
          image: alpine:3.19
          command:
            - sh
            - -c
            - |
              apk add --no-cache inotify-tools procps
              echo "Reloader started, watching /etc/nginx/blocklist.d"
              while true; do
                inotifywait -e modify,create,delete,move /etc/nginx/blocklist.d
                echo "[$(date '+%Y-%m-%d %H:%M:%S')] [INFO] blocklist.d changed, reloading nginx"
                NGINX_PID=$(pgrep -f 'nginx: master' | head -1)
                if [ -n "$NGINX_PID" ]; then
                  kill -HUP "$NGINX_PID"
                  echo "[$(date '+%Y-%m-%d %H:%M:%S')] [INFO] nginx reloaded successfully (pid $NGINX_PID)"
                else
                  echo "[$(date '+%Y-%m-%d %H:%M:%S')] [WARN] nginx master process not found, skipping reload"
                fi
              done
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: nginx-blocklist
              mountPath: /etc/nginx/blocklist.d

      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
        - name: nginx-blocklist
          configMap:
            name: nginx-blocklist
            optional: true
        - name: nginx-logs
          emptyDir: {}
