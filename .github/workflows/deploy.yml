name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy"
        required: false
        default: "latest"

env:
  AWS_REGION: ap-southeast-1
  NAMESPACE: aiops

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install AI Engine dependencies
        run: pip install -r services/ai_engine/requirements.txt

      - name: Install Worker Orchestrator dependencies
        run: pip install -r services/worker_orchestrator/requirements.txt

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio anyio trio

      - name: Run AI Engine tests
        run: python -m pytest tests/ai-engine/ -v --tb=short
        env:
          PYTHONPATH: .
          INTERNAL_SECRET: test-secret-for-ci
          REDIS_HOST: localhost

      - name: Run Worker Orchestrator tests
        run: python -m pytest tests/worker-orchestrator/ -v --tb=short
        env:
          PYTHONPATH: .
          INTERNAL_SECRET: test-secret-for-ci
          REDIS_HOST: localhost

  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.set-tag.outputs.image_tag }}
      ai_engine_image: ${{ steps.set-tag.outputs.ai_engine_image }}
      worker_image: ${{ steps.set-tag.outputs.worker_image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set image tag
        id: set-tag
        run: |
          IMAGE_TAG="${{ github.event.inputs.image_tag || github.sha }}"
          REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          AI_ENGINE_IMAGE="$REGISTRY/aiops-traffic-shaper/ai-engine:$IMAGE_TAG"
          WORKER_IMAGE="$REGISTRY/aiops-traffic-shaper/worker-orchestrator:$IMAGE_TAG"

          echo "image_tag=$IMAGE_TAG"             >> "$GITHUB_OUTPUT"
          echo "ai_engine_image=$AI_ENGINE_IMAGE" >> "$GITHUB_OUTPUT"
          echo "worker_image=$WORKER_IMAGE"        >> "$GITHUB_OUTPUT"

          echo "IMAGE_TAG=$IMAGE_TAG"             >> "$GITHUB_ENV"
          echo "AI_ENGINE_IMAGE=$AI_ENGINE_IMAGE" >> "$GITHUB_ENV"
          echo "WORKER_IMAGE=$WORKER_IMAGE"       >> "$GITHUB_ENV"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push AI Engine image
        run: |
          docker build             --tag "$AI_ENGINE_IMAGE"             --tag "${AI_ENGINE_IMAGE%:*}:latest"             --file services/ai_engine/Dockerfile             --cache-from "${AI_ENGINE_IMAGE%:*}:latest"             .
          docker push "$AI_ENGINE_IMAGE"
          docker push "${AI_ENGINE_IMAGE%:*}:latest"

      - name: Build and push Worker Orchestrator image
        run: |
          docker build             --tag "$WORKER_IMAGE"             --tag "${WORKER_IMAGE%:*}:latest"             --file services/worker_orchestrator/Dockerfile             --cache-from "${WORKER_IMAGE%:*}:latest"             .
          docker push "$WORKER_IMAGE"
          docker push "${WORKER_IMAGE%:*}:latest"

  deploy:
    name: Deploy to Cluster
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Configure kubeconfig via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MASTER_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.MASTER_NODE_IP }}" >> ~/.ssh/known_hosts
          mkdir -p ~/.kube
          scp -i ~/.ssh/id_rsa             ubuntu@${{ secrets.MASTER_NODE_IP }}:~/.kube/config             ~/.kube/config
          sed -i "s|server: https://.*:6443|server: https://${{ secrets.MASTER_NODE_IP }}:6443|g"             ~/.kube/config

      - name: Verify cluster connection
        run: kubectl cluster-info

      - name: Deploy to cluster
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          AI_ENGINE_IMAGE: ${{ needs.build-and-push.outputs.ai_engine_image }}
          WORKER_IMAGE: ${{ needs.build-and-push.outputs.worker_image }}
          INTERNAL_SECRET: ${{ secrets.INTERNAL_SECRET }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: bash scripts/deploy.sh "$IMAGE_TAG"

      - name: Run health check
        run: bash scripts/health-check.sh

      - name: Notify on success
        if: success()
        run: |
          echo "Deploy succeeded"
          echo "Image tag : ${{ needs.build-and-push.outputs.image_tag }}"
          echo "Namespace : ${{ env.NAMESPACE }}"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deploy failed, rolling back"
          bash scripts/rollback.sh ai-engine || true
          bash scripts/rollback.sh worker-orchestrator || true
