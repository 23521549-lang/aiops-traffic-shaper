apiVersion: v1
kind: ServiceAccount
metadata:
  name: worker-orchestrator
  namespace: aiops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: worker-orchestrator
  namespace: aiops
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["nginx-blocklist", "nginx-ratelimit"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: worker-orchestrator
  namespace: aiops
subjects:
  - kind: ServiceAccount
    name: worker-orchestrator
    namespace: aiops
roleRef:
  kind: Role
  name: worker-orchestrator
  apiGroup: rbac.authorization.k8s.io
