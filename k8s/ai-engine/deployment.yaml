apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-engine
  namespace: aiops
  labels:
    app: ai-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-engine
  template:
    metadata:
      labels:
        app: ai-engine
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: ai-engine
          image: ${AI_ENGINE_IMAGE}
          ports:
            - containerPort: 8000
          env:
            - name: INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: aiops-internal-secret
                  key: INTERNAL_SECRET
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: SHADOW_MODE
              value: "true"
            - name: RETRAIN_INTERVAL_HOURS
              value: "24"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          volumeMounts:
            - name: model-store
              mountPath: /app/models
      volumes:
        - name: model-store
          persistentVolumeClaim:
            claimName: model-store
