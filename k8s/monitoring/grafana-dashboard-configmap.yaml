apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: aiops
data:
  aiops-overview.json: |
    {
      "title": "AIOps Traffic Shaper — Overview",
      "uid": "aiops-overview",
      "timezone": "browser",
      "refresh": "10s",
      "panels": [
        {
          "id": 1,
          "title": "Shadow Mode Active",
          "type": "stat",
          "gridPos": {"h": 4, "w": 4, "x": 0, "y": 0},
          "targets": [{
            "expr": "shadow_mode_active",
            "legendFormat": "Shadow Mode"
          }],
          "options": {
            "colorMode": "background",
            "thresholds": {
              "steps": [
                {"color": "green", "value": 0},
                {"color": "orange", "value": 1}
              ]
            }
          }
        },
        {
          "id": 2,
          "title": "Active Hard Blocks",
          "type": "stat",
          "gridPos": {"h": 4, "w": 4, "x": 4, "y": 0},
          "targets": [{
            "expr": "nginx_blocked_ips_total",
            "legendFormat": "Blocked IPs"
          }],
          "options": {"colorMode": "background"}
        },
        {
          "id": 3,
          "title": "Active Rate Limits",
          "type": "stat",
          "gridPos": {"h": 4, "w": 4, "x": 8, "y": 0},
          "targets": [{
            "expr": "nginx_rate_limited_ips_total",
            "legendFormat": "Rate Limited IPs"
          }]
        },
        {
          "id": 4,
          "title": "Cost Saved (last 1h USD)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 4, "x": 12, "y": 0},
          "targets": [{
            "expr": "increase(estimated_cloud_cost_saved_usd[1h])",
            "legendFormat": "USD saved"
          }]
        },
        {
          "id": 5,
          "title": "Anomaly Detection Rate",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "targets": [
            {
              "expr": "rate(ai_anomalies_detected_total{tier=\"1\"}[5m])",
              "legendFormat": "Tier 1 (rate-limit)"
            },
            {
              "expr": "rate(ai_anomalies_detected_total{tier=\"2\"}[5m])",
              "legendFormat": "Tier 2 (hard block)"
            }
          ]
        },
        {
          "id": 6,
          "title": "ML Inference Latency (p95)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "targets": [{
            "expr": "histogram_quantile(0.95, rate(inference_duration_seconds_bucket[5m]))",
            "legendFormat": "p95 latency"
          }]
        },
        {
          "id": 7,
          "title": "Feature Drift Score",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "targets": [{
            "expr": "feature_drift_score",
            "legendFormat": "{{feature}}"
          }]
        },
        {
          "id": 8,
          "title": "Model Anomaly Score Distribution",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "targets": [
            {
              "expr": "model_anomaly_score_mean",
              "legendFormat": "mean ({{version}})"
            },
            {
              "expr": "model_anomaly_score_std",
              "legendFormat": "std ({{version}})"
            }
          ]
        }
      ]
    }
