apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit
  namespace: aiops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fluent-bit
  namespace: aiops
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fluent-bit
  namespace: aiops
subjects:
  - kind: ServiceAccount
    name: fluent-bit
    namespace: aiops
roleRef:
  kind: Role
  name: fluent-bit
  apiGroup: rbac.authorization.k8s.io
