server {
    listen 80;
    server_name _;

    # Apply blocklist
    include /etc/nginx/blocklist.conf;

    # Apply global rate limit
    limit_req zone=global_limit
        burst=${NGINX_RATE_LIMIT_BURST}
        nodelay;

    location / {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    location /health {
        access_log off;
        # Health check exempt from rate limiting
        limit_req off;
        return 200 'healthy';
        add_header Content-Type text/plain;
    }

    # Strict rate limit for sensitive paths
    location ~* ^/(login|api/auth|admin) {
        limit_req zone=strict_limit
            burst=${NGINX_STRICT_RATE_LIMIT_BURST}
            nodelay;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Return 429 with JSON body
    error_page 429 = @rate_limited;
    location @rate_limited {
        default_type application/json;
        return 429 '{"error":"rate_limit_exceeded","message":"Too many requests"}';
    }
}
