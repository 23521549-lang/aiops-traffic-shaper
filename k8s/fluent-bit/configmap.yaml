apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: aiops
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         1
        Daemon        Off
        Log_Level     info
        Parsers_File  /fluent-bit/etc/parsers.conf
        HTTP_Server   Off

    [INPUT]
        Name              tail
        Path              /var/log/nginx/access.log
        Parser            nginx_json
        Tag               nginx.access
        Refresh_Interval  1
        Mem_Buf_Limit     10MB
        DB                /fluent-bit/db/nginx-tail.db
        Skip_Long_Lines   On

    [FILTER]
        Name    grep
        Match   nginx.access
        Exclude request_uri /health

    [OUTPUT]
        Name              http
        Match             nginx.access
        Host              ai-engine
        Port              8000
        URI               /api/v1/telemetry
        Format            json
        Header            X-Internal-Token ${INTERNAL_SECRET}
        Header            Content-Type application/json
        Retry_Limit       5
        Workers           2

  parsers.conf: |
    [PARSER]
        Name        nginx_json
        Format      json
        Time_Key    time_iso8601
        Time_Format %Y-%m-%dT%H:%M:%S%z
        Time_Keep   On
